uni_token:
  chain: ethereum
  # Deliberately not UNI's real address (0x1f98…f984) — that would match the
  # `uni-eth` slug and redirect tests hitting the hex URL. Use an arbitrary
  # non-slug address so fixture-driven tests don't get 301'd.
  address: "0x1111111111111111111111111111111111111111"
  name: Uni
  compiler_version: "v0.5.16+commit.9c3226ce"
  abi: <%= [{"type"=>"function","name"=>"totalSupply","inputs"=>[],"outputs"=>[{"name"=>"","type"=>"uint256"}],"stateMutability"=>"view"},{"type"=>"function","name"=>"approve","inputs"=>[{"name"=>"spender","type"=>"address"},{"name"=>"rawAmount","type"=>"uint256"}],"outputs"=>[{"name"=>"","type"=>"bool"}],"stateMutability"=>"nonpayable"},{"type"=>"event","name"=>"Transfer","inputs"=>[{"name"=>"from","type"=>"address","indexed"=>true},{"name"=>"to","type"=>"address","indexed"=>true},{"name"=>"amount","type"=>"uint256","indexed"=>false}]}].to_json %>
  verified_at: <%= 1.hour.ago %>

empty_contract:
  chain: ethereum
  address: "0x0000000000000000000000000000000000000001"
  name: Empty
